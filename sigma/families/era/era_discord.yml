title: Era Stealer Discord Token Enrichment Activity
id: e1c3a4b1-6c7d-4b8b-9e8a-era-discord
status: experimental
description: Detects Era Stealer Discord token validation and enrichment via Discord API
author: No-Stealer Project
date: 2026-01-12
confidence: high
logsource:
  category: network_connection
  product: windows

detection:
  selection_api:
    DestinationHostname|contains:
      - "discord.com"
    DestinationPort: 443

  selection_paths:
    Url|contains:
      - "/api/v6/users/@me"
      - "/api/v9/users/@me"
      - "/billing/payment-sources"
      - "/users/@me/relationships"
      - "/users/@me/guilds"

  condition: selection_api and selection_paths

falsepositives:
  - Legitimate Discord client activity (without token scraping context)

level: high
tags:
  - attack.credential_access
  - attack.t1555
  - attack.t1539
