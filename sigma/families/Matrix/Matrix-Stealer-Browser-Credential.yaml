title: Matrix Stealer Browser Credential Extraction
id: 7c2e9f1b-1b9f-4e2e-9f1a-matrix-cred
status: experimental
description: Detects Matrix Stealer style Chromium credential extraction and staging
author: SOC Detection
date: 2026/02/18
logsource:
  product: windows
  category: process_creation

detection:

  selection_browser_paths:
    CommandLine|contains:
      - "Login Data"
      - "Web Data"
      - "Local State"
      - "Cookies"

  selection_dpapi:
    CommandLine|contains:
      - "CryptUnprotectData"
      - "DPAPI"

  selection_staging:
    CommandLine|contains:
      - "\\AppData\\Local\\Temp\\"
      - ".zip"
      - ".rar"

  condition: selection_browser_paths and selection_staging

fields:
  - Image
  - CommandLine
  - ParentImage
  - User

falsepositives:
  - Legitimate backup tools
  - Enterprise password migration tools

level: high
