title: Genesis Stealer Minecraft Account Collection
id: 1f2e9c4b-genesis-005
status: experimental
description: Detects access to Minecraft and Lunar Client account files
author: No-Stealer Project
logsource:
  product: windows
  category: file_access
detection:
  selection:
    TargetFilename|endswith:
      - "launcher_profiles.json"
      - "accounts.json"
      - "settings.json"
    TargetFilename|contains:
      - ".minecraft"
      - ".lunarclient"
  condition: selection
falsepositives:
  - Game launchers
level: medium
tags:
  - attack.collection
  - attack.t1005
