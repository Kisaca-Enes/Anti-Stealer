title: EvilSoul Stealer - TEMP ZIP Data Staging
id: 7b7c0d5e-evil-003
status: experimental
description: Detects ZIP archive creation in TEMP directory used for credential exfiltration.
author: No-Stealer Project
date: 2026-01-12
tags:
  - attack.collection
  - attack.t1005
  - malware.evilsoul

logsource:
  product: windows
  category: file_event

detection:
  selection:
    TargetFilename|contains:
      - '\AppData\Local\Temp\'
    TargetFilename|endswith: '.zip'

  condition: selection

falsepositives:
  - Legitimate installers
  - Compression utilities

level: medium
