title: EvilSoul Stealer - Forced Browser Termination
id: 7b7c0d5e-evil-002
status: experimental
description: Detects forced termination of browsers via taskkill, a common EvilSoul precursor to cookie theft.
author: No-Stealer Project
date: 2026-01-12
tags:
  - attack.defense_evasion
  - attack.t1070
  - malware.evilsoul

logsource:
  product: windows
  category: process_creation

detection:
  selection:
    Image|endswith: '\taskkill.exe'
    CommandLine|contains:
      - 'chrome.exe'
      - 'msedge.exe'
      - 'opera.exe'
      - 'brave.exe'

  condition: selection

falsepositives:
  - Manual user troubleshooting

level: medium
