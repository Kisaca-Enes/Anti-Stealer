title: Lina Stealer Discord Kill and Restart
id: lina-02-discord-kill-restart
status: stable
description: Detects Discord termination and restart behavior specific to Lina Stealer
author: No-Stealer Project
date: 2026-01-14
logsource:
  product: windows
  category: process_creation
detection:
  kill:
    Image|endswith: '\taskkill.exe'
    CommandLine|contains:
      - "Discord.exe"
      - "DiscordCanary.exe"
      - "DiscordPTB.exe"
  restart:
    CommandLine|contains:
      - "Update.exe"
      - "--processStart Discord"
  condition: kill and restart
level: high
tags:
  - attack.defense_evasion
  - attack.t1562
  - lina.stealer
