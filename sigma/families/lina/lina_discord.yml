title: Lina Stealer Discord Token Validation
id: lina-01-discord-token-validate
status: stable
description: Detects Discord token validation behavior used by Lina Stealer
author: No-Stealer Project
date: 2026-01-14
logsource:
  category: proxy
  product: windows
detection:
  selection:
    cs-host: "discord.com"
    cs-method: "GET"
    cs-uri: "/api/v9/users/@me"
    http_request_headers|contains: "Authorization"
  condition: selection
level: high
tags:
  - attack.credential_access
  - attack.t1555
  - lina.stealer
